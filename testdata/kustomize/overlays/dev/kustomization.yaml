apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: web
        namespace: default
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: web
                resources:
                  limits:
                    cpu: "200m"
                    memory: "128Mi"
                  requests:
                    cpu: "50m"
                    memory: "64Mi"
